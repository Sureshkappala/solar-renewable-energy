<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register | Stackly Renewable Energy</title>

<link rel="stylesheet" href="css/register.css">
<link rel="stylesheet" href="css/responsive.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">

</head>

<body>

<div class="register-container">

    <!-- Left Side -->

    <div class="register-image">

        <img src="images/login.webp" alt="Renewable Energy">

        <div class="image-overlay">

            

            <h1>Create a <span>Greener Future</span></h1>

            <p>
                Join Stackly Renewable Energy and become part of the clean energy revolution.
            </p>

        </div>

    </div>

    <!-- Right Side -->

    <div class="register-box">

        <img src="images/logo.webp" class="logo">

        <h2>Create Account</h2>

        <p>Register to continue</p>

        <form>

            <input type="text" placeholder="Full Name" required>

            <input type="email" placeholder="Email Address" required>

            <input type="tel" placeholder="Mobile Number" maxlength="10" required>

            <div class="password-box">

                <input type="password" id="password" placeholder="Password" required>

                <i class="fa-solid fa-eye" id="togglePassword"></i>

            </div>

            <div class="password-box">

                <input type="password" id="confirmPassword" placeholder="Confirm Password" required>

                <i class="fa-solid fa-eye" id="toggleConfirmPassword"></i>

            </div>

            <select required>

                <option value="">Select Role</option>

                <option>User</option>

                <option>Admin</option>

            </select>

            <label class="terms">

                <input type="checkbox" required>

                I agree to the Terms & Conditions

            </label>

            <button type="submit">

                Create Account

            </button>

            <p class="login-link">

                Already have an account?

                <a href="login.html">

                    Login

                </a>

            </p>

        </form>

    </div>

</div>

<script src="js/register.js"></script>

</body>

</html>
